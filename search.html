<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Search</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 100px;
        }

        .search-container {
            background-color: white;
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
        }

        .search-box {
            display: flex;
            justify-content: center;
        }

        input {
            width: 70%;
            padding: 10px;
            border: 1px solid gray;
            border-radius: 5px 0 0 5px;
        }

        button {
            padding: 10px;
            border: none;
            background-color: blue;
            color: white;
            cursor: pointer;
            border-radius: 0 5px 5px 0;
        }

        button:hover {
            background-color: darkblue;
        }

        #message {
            margin-top: 15px;
            color: red;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="search-container">

        <h2>Find Your Book</h2>

        <div class="search-box">

            <input type="text" id="searchInput" placeholder="Search books...">

            <button onclick="searchBook()">🔍</button>

        </div>

        <p id="message"></p>

    </div>

    <script>

        let books = {

            <a href="diary of an oxygen thief.pdf">

            "then she was gone": "books/then-she-was-gone.pdf",

            "the psychology of money": "books/the-psychology-of-money.pdf",

            "rich dad poor dad": "books/rich-dad-poor-dad.pdf"
        };

        function searchBook() {

            let input = document.getElementById("searchInput").value.toLowerCase();

            let message = document.getElementById("message");

            if (books[input]) {

                let openBook = confirm(
                    "Book found! Click OK to open the PDF."
                );

                if (openBook) {

                    window.location.href = books[input];
                }

                message.innerHTML = "";

            } else {

                message.innerHTML = "Book not found in the website.";
            }
        }

    </script>

</body>
</html>
